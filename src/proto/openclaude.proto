syntax = "proto3";

package openclaude.v1;

// Main Agent Service
service AgentService {
  // Bidirectional stream: client sends tasks and answers to agent prompts,
  // server streams text tokens, tool states, and requests permissions.
  rpc Chat(stream ClientMessage) returns (stream ServerMessage);
}

// ---------------------------------------------------------
// MESSAGES FROM CLIENT (Input)
// ---------------------------------------------------------
message ClientMessage {
  oneof payload {
    // 1. Initial request (first message in the stream)
    ChatRequest request = 2;

    // 2. User response to an agent prompt (e.g., command confirmation)
    UserInput input = 3;

    // 3. Interrupt signal (if the user clicks "Stop generation")
    CancelSignal cancel = 4;
  }
}

message ChatRequest {
  string message = 1;
  string working_directory = 2; // Where the agent should execute commands
  reserved 3;                   // Reserved to prevent accidental reuse
  optional string model = 4;
  string session_id = 5;        // Non-empty = cross-stream session persistence (legacy)

  // ─── FASE 14.0/3a — Claude Code SDK foundation ─────────────────────
  // All optional. Runners that don't recognize them ignore safely
  // (proto3 default behavior). Today only claude-code-runner consumes
  // them; openclaude-runner / aider-runner ignore.

  // When set, the runner resumes the named CLI session instead of
  // starting a new one. Conversation history is loaded by the CLI
  // from its on-disk store (mounted as the claude_code_state volume).
  optional string resume_session_id = 6;

  // Enable extended thinking for the underlying Anthropic model. The
  // CLI streams `thinking` content blocks back as ThinkingChunk events
  // when this is on. Default (false) keeps current behavior.
  optional bool enable_thinking = 7;

  // Thinking budget in tokens (Anthropic API param). 0 = SDK default.
  // Only meaningful when enable_thinking = true.
  optional int32 thinking_budget_tokens = 8;
}

message UserInput {
  string reply = 1;       // Text response (e.g., "y", "no", or clarification)
  string prompt_id = 2;   // ID of the prompt we are responding to
}

message CancelSignal {
  string reason = 1;
}

// ---------------------------------------------------------
// MESSAGES FROM SERVER (Output / Events)
// ---------------------------------------------------------
message ServerMessage {
  // Using oneof guarantees that only one type of event arrives at a time
  oneof event {
    TextChunk text_chunk = 1;          // Chunk of text from LLM
    ToolCallStart tool_start = 2;      // Agent started using a tool
    ToolCallResult tool_result = 3;    // Tool returned a result
    ActionRequired action_required = 4;// Agent requires human intervention
    FinalResponse done = 5;            // Generation successfully completed
    ErrorResponse error = 6;           // A critical error occurred
    // FASE 14.0/3a — extended thinking deltas. Emitted as the model
    // streams its reasoning blocks (only with --include-partial-messages
    // and a model that supports thinking). Adapter persists as a
    // distinct THINKING event; runners that don't emit it (openclaude,
    // aider) simply skip the case.
    ThinkingChunk thinking_chunk = 7;
  }
}

// Stream text chunk
message TextChunk {
  string text = 1;
}

// Agent decided to use a tool (bash, read_file, etc.)
message ToolCallStart {
  string tool_name = 1;
  string arguments_json = 2; // Arguments in JSON format
  string tool_use_id = 3;    // Correlation ID matching ToolCallResult
}

// Result of tool execution
message ToolCallResult {
  string tool_name = 1;
  string output = 2;      // stdout/stderr or file contents
  bool is_error = 3;      // Did the command itself fail
  string tool_use_id = 4; // Correlation ID matching ToolCallStart
}

// Agent paused work and is waiting for user decision
message ActionRequired {
  string prompt_id = 1;        // Client must return this ID in UserInput
  string question = 2;         // Question text (e.g., "Execute 'rm -rf /'?")
  enum ActionType {
    CONFIRM_COMMAND = 0;       // Yes/No
    REQUEST_INFORMATION = 1;   // Text input
  }
  ActionType type = 3;
}

// Final statistics
message FinalResponse {
  string full_text = 1;     // The entire generated text
  int32 prompt_tokens = 2;
  int32 completion_tokens = 3;
  // FASE 14.0/3a: identifier of the session that just completed. The
  // runner reports it back so the adapter can persist it on the
  // work_item and clients can pass it as `resume_session_id` to
  // continue. Empty string when the runner doesn't support sessions.
  string session_id = 4;
}

// FASE 14.0/3a — extended thinking delta from the model. Sent inline
// in the gRPC stream, BEFORE the corresponding TextChunk(s). Adapter
// MUST persist as a distinct event type so audit can replay reasoning
// vs final answer separately. The text is incremental — concatenate
// multiple chunks for the full thought.
message ThinkingChunk {
  string text = 1;
}

message ErrorResponse {
  string message = 1;
  string code = 2;
}