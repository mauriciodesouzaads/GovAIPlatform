services:
  database:
    profiles: ["dev", "prod"]
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: govai_platform
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
    # Em produção, remova o port mapping ou restrinja a uma VPN/bastion.
    # Para desenvolvimento local, expõe apenas no loopback.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # 00_init_roles.sh roda ANTES de init.sql (ordem alfabética).
      # Ele lê DB_APP_PASSWORD do ambiente e cria govai_app sem senha hardcoded.
      - ./scripts/init-roles.sh:/docker-entrypoint-initdb.d/00_init_roles.sh
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - govai-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d govai_platform" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    profiles: ["dev", "prod"]
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    # Em produção, remova o port mapping.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - govai-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  litellm:
    profiles: ["dev", "prod"]
    # DEV: Usa tag flutuante para facilitar updates locais.
    # PRODUÇÃO: docker-compose.prod.yml usa digest imutável sha256:690bcb7a...
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    # ports: moved to docker-compose.override.yml (dev only — 127.0.0.1:4000:4000)
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    env_file:
      - .env
    # NÃO liste API keys em environment: — o shell do host pode sobrescrever com
    # variável vazia, quebrando a autenticação. env_file é a fonte de verdade.
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request,os; req=urllib.request.Request(\"http://localhost:4000/health\",headers={\"Authorization\":\"Bearer \"+os.environ[\"LITELLM_KEY\"]}); urllib.request.urlopen(req)'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  presidio:
    profiles: ["dev", "prod"]
    build:
      context: ./presidio
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5001/health\")'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    profiles: ["dev", "prod"]
    build: .
    command: ["/bin/bash", "/app/scripts/entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql://govai_app:${DB_APP_PASSWORD}@database:5432/govai_platform
      POSTGRES_SUPERUSER_URL: postgresql://postgres:${DB_PASSWORD}@database:5432/govai_platform
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
      LITELLM_URL: http://litellm:4000
      SIGNING_SECRET: ${SIGNING_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      AI_MODEL: ${AI_MODEL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LITELLM_KEY: ${LITELLM_KEY}
      # --- Presidio NLP (Tier 2 DLP) ---
      PRESIDIO_URL: http://presidio:5001
      # --- Langfuse Observability ---
      LANGFUSE_URL: ${LANGFUSE_URL:-https://cloud.langfuse.com}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      # --- SSO OIDC ---
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      ORG_MASTER_KEY: ${ORG_MASTER_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      ADMIN_UI_ORIGIN: ${ADMIN_UI_ORIGIN:-http://localhost:3001}
      # --- Shield BullMQ Collectors ---
      MICROSOFT_TOKEN: ${MICROSOFT_TOKEN:-}
      GOOGLE_ADMIN_TOKEN: ${GOOGLE_ADMIN_TOKEN:-}
      ADMIN_UI_URL: ${ADMIN_UI_URL:-http://localhost:3001}
      # --- OpenClaude transport (FASE 5-hardening, isolated in FASE 13.5b) ---
      # Prefer unix socket via isolated volume; falls back to TCP if the
      # socket is not accessible. Each runner now owns its own socket volume
      # so concurrent bind attempts by different uids can't collide. See
      # docs/ADR-023 and the 13.5b/0 commit for the symmetry fix.
      OPENCLAUDE_SOCKET_PATH: ${OPENCLAUDE_SOCKET_PATH:-/var/run/govai/openclaude/openclaude.sock}
      OPENCLAUDE_GRPC_HOST: openclaude-runner:50051
      # 600000 = 10 min. The 5 min default was tight for tool-using
      # delegations on slower fallback models — Cerebras qwen-3-235b
      # can take 30-60s per turn, and a chained Bash → analyse →
      # respond loop with auto_all easily exceeds 5 min on the bigger
      # model variants. .env can still override either direction.
      OPENCLAUDE_TIMEOUT_MS: ${OPENCLAUDE_TIMEOUT_MS:-600000}
      # --- Claude Code Official transport (FASE 7) ---
      # Same socket/TCP pattern as OpenClaude. The `claude-code-runner`
      # service only comes up under the 'official' profile — these env
      # vars let the runtime resolver and isRuntimeAvailable() see that
      # the target is configured, and map 'claude_code_official' to the
      # sidecar socket when it IS running.
      CLAUDE_CODE_SOCKET_PATH: ${CLAUDE_CODE_SOCKET_PATH:-/var/run/govai/claude-code/claude-code.sock}
      CLAUDE_CODE_GRPC_HOST: ${CLAUDE_CODE_GRPC_HOST:-claude-code-runner:50051}
      # --- OpenTelemetry tracing (FASE 10) ---
      # Opt-in: set OTEL_ENABLED=true + run the otel-collector profile
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-govai-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT:-development}
      # --- Stream registry mode (FASE 9) ---
      # - local: single-instance only (default, dev)
      # - distributed: Redis pub/sub for multi-replica (required for k8s >1 replica)
      STREAM_REGISTRY_MODE: ${STREAM_REGISTRY_MODE:-local}
      GOVAI_WORKSPACE_BASE: /tmp/govai-workspaces
      GOVAI_WORKSPACE_MAX_AGE_HOURS: ${GOVAI_WORKSPACE_MAX_AGE_HOURS:-24}
      # --- Chat wrapper (FASE 6) ---
      GOVAI_DEMO_API_KEY: ${GOVAI_DEMO_API_KEY:-sk-govai-demo00000000000000000000}
    volumes:
      # FASE 13.5b/0: each runner now owns a dedicated socket volume so
      # EACCES between containers with different uids cannot happen. The
      # api mounts each runner's volume at a distinct subpath (read-only)
      # and reads the socket from there. The runners themselves keep
      # their internal socket paths at /var/run/govai/<name>.sock — no
      # Dockerfile change needed for either of them.
      - govai_sockets_openclaude:/var/run/govai/openclaude:ro
      - govai_sockets_claude_code:/var/run/govai/claude-code:ro
      - govai_workspaces:/tmp/govai-workspaces
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      # litellm and presidio removed from hard deps — api connects lazily at runtime.
      # This speeds up startup by ~60-90s. If LiteLLM is unavailable, /v1/execute
      # returns 502; all governance/audit/DLP logic still runs normally.
    networks:
      - govai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  admin-ui:
    profiles: ["dev", "prod"]
    build:
      context: ./admin-ui
      dockerfile: Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - govai-net
    healthcheck:
      # Use 127.0.0.1 explicitly — inside the container `localhost` resolves
      # to ::1 (IPv6) but Next.js binds IPv4-only, so wget http://localhost
      # fails with "Connection refused" even when the server is healthy.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  openclaude-runner:
    profiles: ["dev"]
    build:
      context: ./openclaude
      dockerfile: Dockerfile.govai
    environment:
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: "50051"
      # FASE 5-hardening: bind on a unix socket exposed via shared volume.
      # The TCP listener is also kept as a fallback for healthcheck and tooling.
      GRPC_SOCKET_PATH: /var/run/govai/openclaude.sock
      OPENCLAUDE_GOVAI_LOCKED_MODE: "true"
      # Force the OpenAI-compatible shim (src/services/api/openaiShim.ts).
      # Without this, OpenClaude's getAPIProvider() defaults to 'firstParty'
      # which talks directly to the Anthropic API with x-api-key auth and
      # fails with "Not logged in · Please run /login" — because the key we
      # have is the LiteLLM proxy key, not a real Anthropic key.
      CLAUDE_CODE_USE_OPENAI: "1"
      # FASE 13.5a1: default changed from govai-llm-gemini to
      # govai-llm-cerebras. Rationale:
      #   - Gemini free tier quota = 20 req/day. In active dev use the
      #     quota exhausts fast, LiteLLM starts returning 429, and the
      #     openclaude-runner retries stretch a single tool call to
      #     60-180s. That hold-time is what makes the TENANT_LIMIT
      #     orphan bug visible in the UI.
      #   - Groq free tier has 6K TPM — too small for OpenClaude's
      #     ~18.6K tokens/turn (big system prompt + tool defs).
      #   - Cerebras qwen-3-235b-a22b-instruct-2507 is healthy, has
      #     ample TPM, and keeps agent quality comparable to Gemini.
      # Override via .env -> OPENCLAUDE_DEFAULT_MODEL for customers
      # running their own routes.
      OPENAI_API_KEY: ${LITELLM_KEY}
      OPENAI_BASE_URL: http://litellm:4000/v1
      OPENAI_MODEL: ${OPENCLAUDE_DEFAULT_MODEL:-govai-llm-cerebras}
      # Security: disable web tools in regulated environment
      OPENCLAUDE_DISABLE_WEB_SEARCH: "true"
      OPENCLAUDE_DISABLE_WEB_FETCH: "true"
    volumes:
      # FASE 13.5b/0: dedicated socket volume per runner (no cross-uid
      # collision). Mount point = /var/run/govai, socket internal path
      # stays /var/run/govai/openclaude.sock. The api mounts this same
      # named volume at /var/run/govai/openclaude (subpath) to read it.
      - govai_sockets_openclaude:/var/run/govai
      - govai_workspaces:/tmp/govai-workspaces
      - openclaude_workspaces:/tmp/govai-workspace
    networks:
      - govai-net
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const net=require('net');const c=net.connect(50051,'127.0.0.1',()=>{c.end();process.exit(0)});c.on('error',()=>process.exit(1))\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── claude-code-runner (FASE 7 — Official Governed Runtime) ─────────────
  # Sidecar that runs the REAL Anthropic Claude Code CLI behind the same
  # gRPC protocol the OpenClaude runner uses. The adapter speaks the same
  # openclaude.proto to both containers — only the target host changes.
  #
  # Profile: 'official' — NOT started by default. Opt in with:
  #   docker compose --profile official up -d claude-code-runner
  # Requires a real ANTHROPIC_API_KEY in the environment. Without one the
  # CLI 401s and the runtime profile resolver falls back to openclaude.
  claude-code-runner:
    profiles: ["official"]
    build:
      context: ./claude-code-runner
      dockerfile: Dockerfile
    environment:
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: "50051"
      GRPC_SOCKET_PATH: /var/run/govai/claude-code.sock
      CLAUDE_CLI_PATH: claude
      # FASE 12: CLI 2.x uses --max-budget-usd instead of --max-turns.
      # 0.50 USD per call is a safe ceiling for short Q&A workloads.
      CLAUDE_CODE_MAX_BUDGET_USD: "0.50"
      # Real Anthropic key — NOT the LiteLLM proxy key. Without this the
      # CLI will 401 and the adapter surfaces the error.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      # FASE 13.5b/0: dedicated socket volume (analogous to openclaude).
      # The runner's internal socket path stays /var/run/govai/claude-code.sock;
      # the api mounts this volume at /var/run/govai/claude-code.
      - govai_sockets_claude_code:/var/run/govai
      - govai_workspaces:/tmp/govai-workspaces
    networks:
      - govai-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const n=require('net');const c=n.connect(50051,'127.0.0.1',()=>{c.end();process.exit(0)});c.on('error',()=>process.exit(1))\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── otel-collector (FASE 10 — Observability) ──────────────────────────────
  # OpenTelemetry Collector for receiving and exporting traces.
  # Profile: 'observability' — NOT started by default.
  # Start with: docker compose --profile observability up -d otel-collector
  # Also requires OTEL_ENABLED=true in the api service env.
  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - govai-net
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  openclaude_workspaces:
  # FASE 13.5b/0 — one socket volume per runner. Before, a single
  # govai_sockets volume was shared across openclaude-runner +
  # claude-code-runner. That caused EACCES when the second runner
  # tried to bind its socket in a directory whose ownership had been
  # claimed by the first runner (different container uids).
  # Each named volume here is private to its runner; the api mounts
  # them read-only at distinct subpaths.
  govai_sockets_openclaude:
  govai_sockets_claude_code:
  govai_workspaces:


networks:
  govai-net:
    driver: bridge
