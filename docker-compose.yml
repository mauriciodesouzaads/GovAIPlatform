services:
  database:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: govai
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d govai" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: --config /app/config.yaml
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4000/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@database:5432/govai
      LITELLM_URL: http://litellm:4000
      SIGNING_SECRET: ${SIGNING_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      AI_MODEL: ${AI_MODEL}
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LITELLM_KEY: ${LITELLM_KEY}
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile.admin
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - govai-net

volumes:
  pgdata:


networks:
  govai-net:
    driver: bridge
