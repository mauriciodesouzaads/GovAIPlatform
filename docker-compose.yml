services:
  database:
    profiles: ["dev", "prod"]
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: govai_platform
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
    # Em produção, remova o port mapping ou restrinja a uma VPN/bastion.
    # Para desenvolvimento local, expõe apenas no loopback.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # 00_init_roles.sh roda ANTES de init.sql (ordem alfabética).
      # Ele lê DB_APP_PASSWORD do ambiente e cria govai_app sem senha hardcoded.
      - ./scripts/init-roles.sh:/docker-entrypoint-initdb.d/00_init_roles.sh
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - govai-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d govai_platform" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    profiles: ["dev", "prod"]
    image: qdrant/qdrant:v1.13.4
    # FASE 14.0/6a₁ — vector DB for the RAG pipeline. Multi-tenant via
    # one collection per org (govai_org_<uuid_compact>). Storage is on
    # disk for the payload (vectors stay in RAM by default, swappable
    # via per-collection on_disk=true).
    ports:
      # Loopback only — same convention as database/redis. Internal
      # services hit qdrant:6333 over the docker network.
      - "127.0.0.1:6333:6333"  # REST
      - "127.0.0.1:6334:6334"  # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      # API key gates write paths; readonly endpoints are still public
      # inside the network. Override in .env for production.
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-govai-qdrant-local-dev}
      QDRANT__LOG_LEVEL: INFO
      # Enable the on-disk payload store (fast indexing + small RAM).
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
    networks:
      - govai-net
    restart: unless-stopped
    healthcheck:
      # Qdrant's image has bash (Debian-based). Use bash explicitly so the
      # /dev/tcp pseudo-device works (dash, the default sh, doesn't).
      # Probes /readyz over a raw TCP socket to avoid pulling curl/wget
      # which aren't in the upstream image.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /readyz HTTP/1.0\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  redis:
    profiles: ["dev", "prod"]
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    # Em produção, remova o port mapping.
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - govai-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  litellm:
    profiles: ["dev", "prod"]
    # DEV: Usa tag flutuante para facilitar updates locais.
    # PRODUÇÃO: docker-compose.prod.yml usa digest imutável sha256:690bcb7a...
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    # ports: moved to docker-compose.override.yml (dev only — 127.0.0.1:4000:4000)
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    env_file:
      - .env
    # NÃO liste API keys em environment: — o shell do host pode sobrescrever com
    # variável vazia, quebrando a autenticação. env_file é a fonte de verdade.
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request,os; req=urllib.request.Request(\"http://localhost:4000/health\",headers={\"Authorization\":\"Bearer \"+os.environ[\"LITELLM_KEY\"]}); urllib.request.urlopen(req)'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  presidio:
    profiles: ["dev", "prod"]
    build:
      context: ./presidio
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5001/health\")'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    profiles: ["dev", "prod"]
    build: .
    command: ["/bin/bash", "/app/scripts/entrypoint.sh"]
    environment:
      DATABASE_URL: postgresql://govai_app:${DB_APP_PASSWORD}@database:5432/govai_platform
      POSTGRES_SUPERUSER_URL: postgresql://postgres:${DB_PASSWORD}@database:5432/govai_platform
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
      LITELLM_URL: http://litellm:4000
      SIGNING_SECRET: ${SIGNING_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      AI_MODEL: ${AI_MODEL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LITELLM_KEY: ${LITELLM_KEY}
      # --- Presidio NLP (Tier 2 DLP) ---
      PRESIDIO_URL: http://presidio:5001
      # --- Langfuse Observability ---
      LANGFUSE_URL: ${LANGFUSE_URL:-https://cloud.langfuse.com}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      # --- SSO OIDC ---
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      ORG_MASTER_KEY: ${ORG_MASTER_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      ADMIN_UI_ORIGIN: ${ADMIN_UI_ORIGIN:-http://localhost:3001}
      # --- Shield BullMQ Collectors ---
      MICROSOFT_TOKEN: ${MICROSOFT_TOKEN:-}
      GOOGLE_ADMIN_TOKEN: ${GOOGLE_ADMIN_TOKEN:-}
      ADMIN_UI_URL: ${ADMIN_UI_URL:-http://localhost:3001}
      # --- OpenClaude transport (FASE 5-hardening, isolated in FASE 13.5b) ---
      # Prefer unix socket via isolated volume; falls back to TCP if the
      # socket is not accessible. Each runner now owns its own socket volume
      # so concurrent bind attempts by different uids can't collide. See
      # docs/ADR-023 and the 13.5b/0 commit for the symmetry fix.
      OPENCLAUDE_SOCKET_PATH: ${OPENCLAUDE_SOCKET_PATH:-/var/run/govai/openclaude/openclaude.sock}
      OPENCLAUDE_GRPC_HOST: openclaude-runner:50051
      # 600000 = 10 min. The 5 min default was tight for tool-using
      # delegations on slower fallback models — Cerebras qwen-3-235b
      # can take 30-60s per turn, and a chained Bash → analyse →
      # respond loop with auto_all easily exceeds 5 min on the bigger
      # model variants. .env can still override either direction.
      OPENCLAUDE_TIMEOUT_MS: ${OPENCLAUDE_TIMEOUT_MS:-600000}
      # --- Claude Code Official transport (FASE 7) ---
      # Same socket/TCP pattern as OpenClaude. The `claude-code-runner`
      # service only comes up under the 'official' profile — these env
      # vars let the runtime resolver and isRuntimeAvailable() see that
      # the target is configured, and map 'claude_code_official' to the
      # sidecar socket when it IS running.
      CLAUDE_CODE_SOCKET_PATH: ${CLAUDE_CODE_SOCKET_PATH:-/var/run/govai/claude-code/claude-code.sock}
      CLAUDE_CODE_GRPC_HOST: ${CLAUDE_CODE_GRPC_HOST:-claude-code-runner:50051}
      # --- Aider transport (FASE 13.5b/3) ---
      # Same socket/TCP pattern as OpenClaude + Claude Code Official.
      # The aider-runner is part of the dev profile by default.
      AIDER_SOCKET_PATH: ${AIDER_SOCKET_PATH:-/var/run/govai/aider/aider.sock}
      AIDER_GRPC_HOST: ${AIDER_GRPC_HOST:-aider-runner:50051}
      # --- OpenTelemetry tracing (FASE 10) ---
      # Opt-in: set OTEL_ENABLED=true + run the otel-collector profile
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-govai-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_ENVIRONMENT: ${OTEL_ENVIRONMENT:-development}
      # --- Stream registry mode (FASE 9) ---
      # - local: single-instance only (default, dev)
      # - distributed: Redis pub/sub for multi-replica (required for k8s >1 replica)
      STREAM_REGISTRY_MODE: ${STREAM_REGISTRY_MODE:-local}
      GOVAI_WORKSPACE_BASE: /tmp/govai-workspaces
      GOVAI_WORKSPACE_MAX_AGE_HOURS: ${GOVAI_WORKSPACE_MAX_AGE_HOURS:-24}
      # --- Chat wrapper (FASE 6) ---
      GOVAI_DEMO_API_KEY: ${GOVAI_DEMO_API_KEY:-sk-govai-demo00000000000000000000}
      # --- RAG / Qdrant (FASE 14.0/6a₁) ---
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-govai-qdrant-local-dev}
      QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX:-govai_org}
      EMBEDDINGS_PROVIDER: ${EMBEDDINGS_PROVIDER:-gemini}
      OPENAI_EMBEDDINGS_API_KEY: ${OPENAI_EMBEDDINGS_API_KEY:-}
      OPENAI_EMBEDDINGS_MODEL: ${OPENAI_EMBEDDINGS_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDINGS_DIM: ${OPENAI_EMBEDDINGS_DIM:-1536}
      RAG_CHUNK_SIZE_TOKENS: ${RAG_CHUNK_SIZE_TOKENS:-512}
      RAG_CHUNK_OVERLAP_TOKENS: ${RAG_CHUNK_OVERLAP_TOKENS:-64}
      RAG_RETRIEVAL_TOP_K: ${RAG_RETRIEVAL_TOP_K:-5}
      RAG_RETRIEVAL_MIN_SCORE: ${RAG_RETRIEVAL_MIN_SCORE:-0.6}
      RAG_MAX_DOCUMENT_SIZE_MB: ${RAG_MAX_DOCUMENT_SIZE_MB:-50}
      RAG_STORAGE_PATH: ${RAG_STORAGE_PATH:-/var/govai/rag-storage}
    volumes:
      # FASE 13.5b/0: each runner now owns a dedicated socket volume so
      # EACCES between containers with different uids cannot happen. The
      # api mounts each runner's volume at a distinct subpath (read-only)
      # and reads the socket from there. The runners themselves keep
      # their internal socket paths at /var/run/govai/<name>.sock — no
      # Dockerfile change needed for either of them.
      - govai_sockets_openclaude:/var/run/govai/openclaude:ro
      - govai_sockets_claude_code:/var/run/govai/claude-code:ro
      - govai_sockets_aider:/var/run/govai/aider:ro
      - govai_workspaces:/tmp/govai-workspaces
      # FASE 14.0/6a₁ — persistent storage for uploaded RAG documents.
      # Uploads stream through the api process and are written here keyed
      # by sha256, so re-uploading the same file is idempotent and the
      # extractor pipeline can re-read on demand.
      - rag_storage:/var/govai/rag-storage
      # FASE 14.0/6a₂.C — skills hybrid storage. Anthropic-style skill
      # bundles imported via /v1/admin/catalog/skills/import-anthropic
      # land here; the runner mounts the same volume read-only at
      # /mnt/skills so the agent can reference skill assets via
      # filesystem paths without any chance of mutating them.
      - skills_storage:/var/govai/skills-storage
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      # litellm and presidio removed from hard deps — api connects lazily at runtime.
      # This speeds up startup by ~60-90s. If LiteLLM is unavailable, /v1/execute
      # returns 502; all governance/audit/DLP logic still runs normally.
    networks:
      - govai-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  admin-ui:
    profiles: ["dev", "prod"]
    build:
      context: ./admin-ui
      dockerfile: Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - govai-net
    healthcheck:
      # Use 127.0.0.1 explicitly — inside the container `localhost` resolves
      # to ::1 (IPv6) but Next.js binds IPv4-only, so wget http://localhost
      # fails with "Connection refused" even when the server is healthy.
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3001/"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  openclaude-runner:
    profiles: ["dev"]
    build:
      context: ./openclaude
      dockerfile: Dockerfile.govai
    environment:
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: "50051"
      # FASE 5-hardening: bind on a unix socket exposed via shared volume.
      # The TCP listener is also kept as a fallback for healthcheck and tooling.
      GRPC_SOCKET_PATH: /var/run/govai/openclaude.sock
      OPENCLAUDE_GOVAI_LOCKED_MODE: "true"
      # Force the OpenAI-compatible shim (src/services/api/openaiShim.ts).
      # Without this, OpenClaude's getAPIProvider() defaults to 'firstParty'
      # which talks directly to the Anthropic API with x-api-key auth and
      # fails with "Not logged in · Please run /login" — because the key we
      # have is the LiteLLM proxy key, not a real Anthropic key.
      CLAUDE_CODE_USE_OPENAI: "1"
      # FASE 13.5a1: default changed from govai-llm-gemini to
      # govai-llm-cerebras. Rationale:
      #   - Gemini free tier quota = 20 req/day. In active dev use the
      #     quota exhausts fast, LiteLLM starts returning 429, and the
      #     openclaude-runner retries stretch a single tool call to
      #     60-180s. That hold-time is what makes the TENANT_LIMIT
      #     orphan bug visible in the UI.
      #   - Groq free tier has 6K TPM — too small for OpenClaude's
      #     ~18.6K tokens/turn (big system prompt + tool defs).
      #   - Cerebras qwen-3-235b-a22b-instruct-2507 is healthy, has
      #     ample TPM, and keeps agent quality comparable to Gemini.
      # Override via .env -> OPENCLAUDE_DEFAULT_MODEL for customers
      # running their own routes.
      OPENAI_API_KEY: ${LITELLM_KEY}
      OPENAI_BASE_URL: http://litellm:4000/v1
      OPENAI_MODEL: ${OPENCLAUDE_DEFAULT_MODEL:-govai-llm-cerebras}
      # Security: disable web tools in regulated environment
      OPENCLAUDE_DISABLE_WEB_SEARCH: "true"
      OPENCLAUDE_DISABLE_WEB_FETCH: "true"
    volumes:
      # FASE 13.5b/0: dedicated socket volume per runner (no cross-uid
      # collision). Mount point = /var/run/govai, socket internal path
      # stays /var/run/govai/openclaude.sock. The api mounts this same
      # named volume at /var/run/govai/openclaude (subpath) to read it.
      - govai_sockets_openclaude:/var/run/govai
      - govai_workspaces:/tmp/govai-workspaces
      - openclaude_workspaces:/tmp/govai-workspace
    networks:
      - govai-net
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const net=require('net');const c=net.connect(50051,'127.0.0.1',()=>{c.end();process.exit(0)});c.on('error',()=>process.exit(1))\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── claude-code-runner (FASE 7 — Official Governed Runtime) ─────────────
  # Sidecar that runs the REAL Anthropic Claude Code CLI behind the same
  # gRPC protocol the OpenClaude runner uses. The adapter speaks the same
  # openclaude.proto to both containers — only the target host changes.
  #
  # Profile: 'official' — NOT started by default. Opt in with:
  #   docker compose --profile official up -d claude-code-runner
  # Requires a real ANTHROPIC_API_KEY in the environment. Without one the
  # CLI 401s and the runtime profile resolver falls back to openclaude.
  claude-code-runner:
    profiles: ["official"]
    build:
      context: ./claude-code-runner
      dockerfile: Dockerfile
    # FASE 14.0/3a: load .env explicitly so ANTHROPIC_API_KEY survives even
    # when the host shell has the same variable set to empty (which happens
    # in the dev workflow that runs Claude Code with a stripped env).
    # Without this, the runner sees an empty key and the CLI 401s.
    # env_file values are overridden by `environment:` keys below — so
    # GRPC_*, CLAUDE_CODE_*, etc. still come from the explicit block.
    env_file:
      - .env
    environment:
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: "50051"
      GRPC_SOCKET_PATH: /var/run/govai/claude-code.sock
      CLAUDE_CLI_PATH: claude
      # FASE 12: CLI 2.x uses --max-budget-usd instead of --max-turns.
      # 0.50 USD per call is a safe ceiling for short Q&A workloads.
      CLAUDE_CODE_MAX_BUDGET_USD: "0.50"
      # FASE 14.0/3a — Leitura A alignment is DEFERRED for claude-code.
      # See docs/ADR-025-claude-code-leitura-a.md.
      #
      # Short version: CLI 2.1.117 sends `thinking: adaptive` on every
      # request. Routing through LiteLLM's `govai-llm-anthropic` alias
      # (claude-sonnet-4-20250514) returns HTTP 400 "adaptive thinking
      # is not supported on this model" — every Claude Code call dies.
      # Using the real Anthropic key against api.anthropic.com lets the
      # newer model resolution happen server-side and the call works.
      #
      # ANTHROPIC_API_KEY is intentionally NOT listed here — listing it
      # here would let an empty host-shell var win over the .env value.
      # env_file: .env above is the source of truth for the key.
      #
      # All other Etapa 3a deliverables (sessions, proto extensions,
      # adapter wiring, UI thinking renderer) stay intact. Leitura A
      # for claude-code reopens when LiteLLM exposes a model alias that
      # supports adaptive thinking; flip env_file back to LITELLM_KEY
      # + add ANTHROPIC_BASE_URL once that lands.
      # Redis is needed so the runner can keep an org-scoped session
      # index (runtime:sessions:<orgId>) for the admin UI to enumerate
      # resumable sessions in Etapa 5. The session conversation state
      # itself lives on disk (claude_code_state volume below).
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    volumes:
      # FASE 13.5b/0: dedicated socket volume (analogous to openclaude).
      # The runner's internal socket path stays /var/run/govai/claude-code.sock;
      # the api mounts this volume at /var/run/govai/claude-code.
      - govai_sockets_claude_code:/var/run/govai
      - govai_workspaces:/tmp/govai-workspaces
      # FASE 14.0/6a₂.C — skills hybrid bundles, read-only mount.
      # The api populates skills_storage on import; this side only
      # reads. RO at the docker level guarantees the agent cannot
      # tamper with shared skill assets even via a compromised tool
      # call. Path chosen to mirror anthropic/skills convention so
      # SKILL.md prompts that reference /mnt/skills resolve naturally.
      - skills_storage:/mnt/skills:ro
      # FASE 14.0/3a — sessions are written to /tmp/.claude inside the
      # container's writable layer (HOME=/tmp). They survive `docker
      # compose restart` but NOT `docker compose down -v` / image rebuild.
      # Acceptable for the foundation etapa; a named volume here was
      # tried and rejected because the docker-managed mount lands as
      # root:root and the CLI (running as uid 1000) silently fails to
      # write transcripts. Proper persistence (with a chowned init
      # container or bind mount) is left for Etapa 5.
    networks:
      - govai-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const n=require('net');const c=n.connect(50051,'127.0.0.1',()=>{c.end();process.exit(0)});c.on('error',()=>process.exit(1))\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── aider-runner (FASE 13.5b/3 — third runtime) ───────────────────────────
  # Python CLI agent (https://aider.chat) wrapped in the same gRPC contract
  # as openclaude-runner and claude-code-runner. Routes LLM calls through
  # LiteLLM — no provider key bypass, same audit/DLP/rate-limit as the
  # other runtimes.
  aider-runner:
    profiles: ["dev"]
    build:
      context: ./aider-runner
      dockerfile: Dockerfile
    environment:
      # Route LLM traffic through the GovAI-managed LiteLLM proxy.
      OPENAI_API_KEY: ${LITELLM_KEY}
      OPENAI_API_BASE: http://litellm:4000/v1
      AIDER_MODEL: ${AIDER_DEFAULT_MODEL:-govai-llm-cerebras}
      GRPC_HOST: "0.0.0.0"
      GRPC_PORT: "50051"
      GRPC_SOCKET_PATH: /var/run/govai/aider.sock
    volumes:
      # Isolated socket volume — same pattern as openclaude/claude-code.
      - govai_sockets_aider:/var/run/govai
      - aider_workspaces:/workspace
    networks:
      - govai-net
    restart: unless-stopped
    depends_on:
      litellm:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys;s=socket.socket();s.settimeout(2);s.connect(('127.0.0.1',50051));s.close()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── otel-collector (FASE 10 — Observability) ──────────────────────────────
  # OpenTelemetry Collector for receiving and exporting traces.
  # Profile: 'observability' — NOT started by default.
  # Start with: docker compose --profile observability up -d otel-collector
  # Also requires OTEL_ENABLED=true in the api service env.
  otel-collector:
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./deploy/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - govai-net
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  openclaude_workspaces:
  # FASE 13.5b/0 — one socket volume per runner. Before, a single
  # govai_sockets volume was shared across openclaude-runner +
  # claude-code-runner. That caused EACCES when the second runner
  # tried to bind its socket in a directory whose ownership had been
  # claimed by the first runner (different container uids).
  # Each named volume here is private to its runner; the api mounts
  # them read-only at distinct subpaths.
  govai_sockets_openclaude:
  govai_sockets_claude_code:
  govai_sockets_aider:
  govai_workspaces:
  aider_workspaces:
  # FASE 14.0/6a₁ — RAG document storage + Qdrant data.
  qdrant_data:
  rag_storage:
  # FASE 14.0/6a₂.C — Skills hybrid storage. The api writes here on
  # POST /v1/admin/catalog/skills/import-anthropic; the runner mounts
  # this read-only at /mnt/skills so the agent can reference skill
  # bundles by path without any chance of mutating them.
  skills_storage:


networks:
  govai-net:
    driver: bridge
