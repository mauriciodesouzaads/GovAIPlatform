services:
  database:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: govai
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - govai-net

  redis:
    image: redis:7-alpine
    networks:
      - govai-net

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: --config /app/config.yaml
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - govai-net

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD}@database:5432/govai
      LITELLM_URL: http://litellm:4000
      SIGNING_SECRET: ${SIGNING_SECRET}
      AI_MODEL: ${AI_MODEL}
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - database
      - redis
      - litellm
    networks:
      - govai-net

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile.admin
    ports:
      - "3001:3001"
    depends_on:
      - api
    networks:
      - govai-net

networks:
  govai-net:
    driver: bridge
