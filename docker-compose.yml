services:
  database:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: govai_platform
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"

    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d govai_platform" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy noeviction --appendonly yes
    ports:
      - "6379:6379"

    volumes:
      - redisdata:/data
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: --config /app/config.yaml
    ports:
      - "4000:4000"

    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:4000/health\")'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  presidio:
    build:
      context: ./presidio
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5001/health\")'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    build: .
    environment:
      DATABASE_URL: postgresql://govai_app:${DB_APP_PASSWORD}@database:5432/govai_platform?schema=public
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      LITELLM_URL: http://litellm:4000
      SIGNING_SECRET: ${SIGNING_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      AI_MODEL: ${AI_MODEL}
      REDIS_URL: redis://redis:6379
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LITELLM_KEY: ${LITELLM_KEY}
      # --- Presidio NLP (Tier 2 DLP) ---
      PRESIDIO_URL: http://presidio:5001
      # --- Langfuse Observability ---
      LANGFUSE_URL: ${LANGFUSE_URL:-https://cloud.langfuse.com}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      # --- SSO OIDC ---
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      ORG_MASTER_KEY: ${ORG_MASTER_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      ADMIN_UI_ORIGIN: ${ADMIN_UI_ORIGIN:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
      presidio:
        condition: service_healthy
    networks:
      - govai-net
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  admin-ui:
    build:
      context: ./admin-ui
      dockerfile: Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - govai-net

volumes:
  pgdata:
  redisdata:


networks:
  govai-net:
    driver: bridge
