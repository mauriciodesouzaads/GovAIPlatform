model_list:
  # Provider Groq — para demo com cliente (AI_MODEL=groq/llama-3.3-70b-versatile)
  - model_name: groq/llama-3.3-70b-versatile
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  # Alias Groq explícito — útil para forçar Groq sem mudar o nome do modelo
  - model_name: govai-llm-groq
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  # Alias de retrocompatibilidade: nome antigo → Groq
  - model_name: gemini/gemini-1.5-flash
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
  # Architect Document Generation — Claude Sonnet via Anthropic
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  # Fallback: Gemini (quando disponível)
  - model_name: gemini/gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
  # DEV: govai-llm → Claude Sonnet (Groq RPD esgotado, Gemini key expirada, Ollama sem disco)
  # Para trocar provider: altere model e api_key abaixo + reinicie litellm
  - model_name: govai-llm
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
general_settings:
  master_key: os.environ/LITELLM_KEY
  drop_params: true
  modify_params: true
