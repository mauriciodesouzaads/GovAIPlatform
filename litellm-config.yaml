model_list:
  # ── govai-llm: primary for short-prompt chat traffic ────────────────────
  # Deterministically routes to Groq llama-3.1-8b-instant (fast + free
  # tier 14.400 RPD, 30 RPM). Good for direct chat where messages fit
  # inside the 6K TPM limit. router_settings.fallbacks below routes to
  # govai-llm-gemini on 429/rate-limit so a transient Groq spike doesn't
  # surface to the user.
  #
  # Current state (April 2026):
  #   ✅ Groq llama-3.1-8b-instant   — 6K TPM / 14.400 RPD (primary chat)
  #   ✅ Cerebras qwen-3-235b        — ~1300 tok/s, structured tool_calls,
  #                                    17K+ context confirmed via empirical
  #                                    probe; fallback for govai-llm AND
  #                                    OpenClaude when Gemini is exhausted
  #   ✅ Cerebras llama3.1-8b        — fast, plain chat only (tool calling
  #                                    returns text-blob, NOT structured —
  #                                    do NOT route OpenClaude here)
  #   ✅ Gemini 2.5 Flash Lite       — 1M context, primary for OpenClaude
  #                                    (1000 RPD / 15 RPM free tier)
  #   ✅ Gemini 2.5 Flash            — backup gemini alias (only 20 RPD
  #                                    on free tier, reserved as last hop)
  #   ✅ Ollama qwen2.5:3b           — local on host (zero quota, zero
  #                                    internet, runs on Apple M2 5GB GPU)
  #   ⚠️ Anthropic Sonnet             — credits depleted (alias kept)

  - model_name: govai-llm
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  # ── Direct provider aliases (exposed to the model selector in /chat) ────

  - model_name: govai-llm-groq
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_key: os.environ/GROQ_API_KEY

  # Bigger Groq model for prompts beyond 8b-instant's 6K TPM limit on
  # Dev Tier accounts. Free tier has 12K TPM / 1000 RPD.
  - model_name: govai-llm-groq-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  # ── Cerebras (free tier, ultra-fast inference) ──────────────────────────
  # The Cerebras free tier on this account exposes 4 model IDs but only
  # qwen-3-235b-a22b-instruct-2507 returns proper structured tool_calls
  # (verified manually with the get_weather function-calling test).
  # llama3.1-8b returns the tool call as a text blob inside .content,
  # which would break OpenClaude's tool execution loop — so we keep it
  # as a chat-only alias and never route the OpenClaude target there.
  - model_name: govai-llm-cerebras
    litellm_params:
      model: cerebras/qwen-3-235b-a22b-instruct-2507
      api_key: os.environ/CEREBRAS_API_KEY

  - model_name: govai-llm-cerebras-fast
    litellm_params:
      model: cerebras/llama3.1-8b
      api_key: os.environ/CEREBRAS_API_KEY

  # Primary target for OpenClaude delegation — its system prompt plus
  # tool definitions is ~18.6K tokens per turn, well within Gemini free
  # tier's 1M TPM. openclaude-runner is pinned to this alias via
  # OPENAI_MODEL in docker-compose so it never accidentally lands on
  # Groq's 6K TPM limit.
  #
  # Flash-LITE specifically: gemini-2.5-flash on free tier is capped at
  # 20 RPD (exhausted in a single dev session), but flash-LITE has
  # 1000 RPD / 15 RPM with the same 1M context window. Function calling
  # works the same way (verified manually with the get_weather tool).
  - model_name: govai-llm-gemini
    litellm_params:
      model: gemini/gemini-2.5-flash-lite
      api_key: os.environ/GEMINI_API_KEY

  # Backup Gemini alias — same provider, bigger model, way smaller quota.
  # Used as a fallback target when flash-lite is itself rate-limited or
  # if a turn needs the larger context window (still 1M but smarter).
  - model_name: govai-llm-gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # ── Ollama local (zero quota, zero cost, zero internet) ────────────────
  # Runs on the developer's host (Apple M2, ~5 GiB Metal). The LiteLLM
  # container reaches the host via host.docker.internal, which Docker
  # Desktop maps automatically on macOS — verified manually before
  # registering this entry. The model is qwen2.5:3b (Q4_K_M, 1.9 GB),
  # which has tool calling support and a 32K context. This is the
  # bottom of the fallback chain — when EVERY cloud provider is dead,
  # the platform still serves chat from this entry.
  - model_name: govai-llm-ollama
    litellm_params:
      model: ollama_chat/qwen2.5:3b
      api_base: http://host.docker.internal:11434

  - model_name: govai-llm-anthropic
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: govai-llm-openai
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  # ── User-facing chat aliases (FASE 14.0/6c.A) ───────────────────────────
  # These names show up in the chat UI's model selector and are seeded
  # in `llm_providers` (migration 097). Prefix-free so they read clean
  # in the dropdown ("Claude Sonnet 4.6" instead of "govai-llm-anthropic").
  #
  # Why a separate alias for each instead of reusing govai-llm-anthropic:
  #   - The chat selector lets the user pick a *specific* model (Opus
  #     vs Sonnet vs Haiku trade off cost/capability differently); a
  #     single govai-llm-anthropic alias hides that choice.
  #   - When OpenAI / Gemini keys are unset, the fallback in `general
  #     _settings.fallbacks` below routes any of these to a working
  #     model, so the UI doesn't 500 on missing creds.
  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY
  - model_name: gemini-2-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

  # ── OpenRouter (optional — multi-provider marketplace) ──────────────────
  # FASE 11: OpenRouter provides access to 500+ models via a single key.
  # Disabled by default (OPENROUTER_API_KEY not set in .env). When enabled,
  # requests go through OpenRouter's edge network (~25-40ms latency, ~5%
  # markup).
  #
  # Use this for experimentation with models NOT available via direct
  # provider integrations. For production traffic on regulated workloads
  # (PII, PHI, financial), prefer direct providers (Groq, Cerebras, Gemini)
  # for lower latency, zero markup, and data sovereignty (requests don't
  # traverse a third-party SaaS edge). The GovAI DLP layer runs BEFORE the
  # LLM call, so data masking applies regardless of backend.
  - model_name: govai-llm-openrouter
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: govai-llm-openrouter-llama
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct
      api_key: os.environ/OPENROUTER_API_KEY

router_settings:
  # Not using simple-shuffle across different providers — Groq would get
  # random large prompts and 429. Instead, govai-llm has exactly one entry
  # (Groq) and we use the fallbacks map to route elsewhere on failure.
  routing_strategy: simple-shuffle
  num_retries: 3
  retry_after: 5
  allowed_fails: 2
  # Fallback chains. The platform must NEVER fail open with a quota error
  # while ANY provider in the chain has headroom.
  #
  # govai-llm  (chat normal): Groq is fast and free but only has 6K TPM,
  #   so for any oversized prompt we hop to Cerebras (qwen-3-235b, ~1300
  #   tok/s), then Gemini Flash Lite, then Gemini Flash, and finally
  #   Ollama on the host (no quota at all).
  #
  # govai-llm-gemini  (OpenClaude target): Gemini Flash Lite is the
  #   primary because of its 1M context. When its 20 RPD per project
  #   daily quota runs out (which happens fast in dev), we hop to
  #   Cerebras qwen-3-235b — ONLY this Cerebras model returns properly
  #   structured tool_calls for OpenClaude — and finally to Ollama on
  #   the host as the absolute floor.
  #
  # IMPORTANT: LiteLLM's mid-stream fallback chain follows the
  # CURRENTLY-failing model_group, not the original request. When
  # govai-llm-gemini falls through to govai-llm-gemini-flash and that
  # also 429s, LiteLLM looks for a fallback for govai-llm-gemini-flash,
  # not for govai-llm-gemini. So EVERY entry in the chain needs its
  # own next-hop entry — otherwise the fallback dies mid-stream.
  fallbacks:
    - govai-llm: ["govai-llm-cerebras", "govai-llm-gemini", "govai-llm-gemini-flash", "govai-llm-ollama"]
    - govai-llm-gemini: ["govai-llm-gemini-flash", "govai-llm-cerebras", "govai-llm-ollama"]
    - govai-llm-gemini-flash: ["govai-llm-cerebras", "govai-llm-ollama"]
    - govai-llm-cerebras: ["govai-llm-gemini", "govai-llm-ollama"]
    - govai-llm-cerebras-fast: ["govai-llm-cerebras", "govai-llm-ollama"]

general_settings:
  master_key: os.environ/LITELLM_KEY
  drop_params: true
  modify_params: true
