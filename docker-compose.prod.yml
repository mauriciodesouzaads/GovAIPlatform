services:
  database:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: govai_platform
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
    # Produção: sem port mapping — DB acessível apenas via rede interna govai-prod-net
    volumes:
      - ./scripts/init-roles.sh:/docker-entrypoint-initdb.d/00_init_roles.sh
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - govai-prod-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1g
        reservations:
          cpus: '0.5'
          memory: 512m
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d govai_platform" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    # Produção: sem port mapping — Redis acessível apenas via rede interna govai-prod-net
    volumes:
      - redisdata-prod:/data
    networks:
      - govai-prod-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  litellm:
    # Digest imutável pinado em 2026-03-12 (tag main-stable).
    # Para atualizar: docker manifest inspect ghcr.io/berriai/litellm:main-stable
    # e substituir o sha256 pelo novo digest após validar em staging.
    image: ghcr.io/berriai/litellm@sha256:690bcb7a5dd11dffc24d7444a35b28723652443a9ab0608a46c05beba91a2193
    command: --config /app/config.yaml
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LITELLM_KEY: ${LITELLM_KEY}
    # Sem port mapping — LiteLLM acessível apenas internamente via govai-prod-net
    networks:
      - govai-prod-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          cpus: '0.2'
          memory: 256m
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:4000/health\")'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  presidio:
    image: ghcr.io/${GH_REPO_OWNER}/govai-presidio:latest
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.2'
          memory: 512M
    networks:
      - govai-prod-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5001/health\")'" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  api:
    image: ghcr.io/${GH_REPO_OWNER}/govai-api:latest
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://govai_app:${DB_APP_PASSWORD}@database:5432/govai_platform
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      LITELLM_URL: http://litellm:4000
      SIGNING_SECRET: ${SIGNING_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      AI_MODEL: ${AI_MODEL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      LITELLM_KEY: ${LITELLM_KEY}
      PRESIDIO_URL: http://presidio:5001
      LANGFUSE_URL: ${LANGFUSE_URL:-https://cloud.langfuse.com}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      ORG_MASTER_KEY: ${ORG_MASTER_KEY}
      APP_BASE_URL: ${APP_BASE_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_UI_ORIGIN: ${ADMIN_UI_ORIGIN}
      METRICS_API_KEY: ${METRICS_API_KEY}
    ports:
      # Bind apenas ao loopback — requer reverse proxy (nginx/Caddy/Traefik) na frente.
      # Para expor diretamente (não recomendado), altere para "3000:3000".
      - "127.0.0.1:3000:3000"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
      presidio:
        condition: service_healthy
    networks:
      - govai-prod-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512m
        reservations:
          cpus: '0.25'
          memory: 256m
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  admin-ui:
    image: ghcr.io/${GH_REPO_OWNER}/govai-admin-ui:latest
    ports:
      # Bind apenas ao loopback — requer reverse proxy na frente para HTTPS.
      - "127.0.0.1:3001:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - govai-prod-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3001/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    # Entrypoint customizado: processa nginx.conf.template com envsubst(API/ADMIN/GRAFANA_DOMAIN)
    # apenas — variáveis nativas do nginx ($host, $request_uri, etc.) ficam intactas.
    entrypoint: ["/docker-entrypoint.sh"]
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - /etc/ssl/govai:/etc/ssl/govai:ro
      - /var/log/govai/nginx:/var/log/nginx
    environment:
      API_DOMAIN: ${API_DOMAIN:-api.govai-platform.com}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.govai-platform.com}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN:-grafana.govai-platform.com}
    depends_on:
      api:
        condition: service_healthy
      admin-ui:
        condition: service_healthy
    networks:
      - govai-prod-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "nginx -t 2>/dev/null && wget --no-verbose --tries=1 --spider http://127.0.0.1:80/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana-oss:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3002}
      GF_ANALYTICS_REPORTING_ENABLED: 'false'
      GF_ANALYTICS_CHECK_FOR_UPDATES: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/govai-platform.json
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    ports:
      - "127.0.0.1:3002:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - govai-prod-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      # O METRICS_API_KEY é escrito em arquivo para que prometheus.yml possa
      # referenciá-lo via credentials_file sem expor o valor em texto plano.
      - prometheus_secrets:/etc/prometheus/secrets
      - prometheusdata:/prometheus
    ports:
      # Prometheus UI — bind ao loopback. Acesse via SSH tunnel ou reverse proxy.
      - "127.0.0.1:9090:9090"
    networks:
      - govai-prod-net
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # Escreve o METRICS_API_KEY em arquivo para o scrape job poder lê-lo
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /etc/prometheus/secrets
        printf '%s' "${METRICS_API_KEY}" > /etc/prometheus/secrets/metrics_api_key
        chmod 600 /etc/prometheus/secrets/metrics_api_key
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=15d \
          --web.enable-lifecycle
    environment:
      - METRICS_API_KEY=${METRICS_API_KEY}
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    entrypoint: ["/etc/alertmanager/docker-entrypoint.sh"]
    volumes:
      - ./observability/alertmanager/docker-entrypoint.sh:/etc/alertmanager/docker-entrypoint.sh:ro
      - ./observability/alertmanager/alertmanager.yml.template:/etc/alertmanager/alertmanager.yml.template:ro
      - alertmanagerdata:/alertmanager
    environment:
      ALERTMANAGER_SMTP_FROM: ${ALERTMANAGER_SMTP_FROM:-alerts@govai-platform.com}
      ALERTMANAGER_SMTP_HOST: ${ALERTMANAGER_SMTP_HOST:-localhost:587}
      ALERTMANAGER_SMTP_USER: ${ALERTMANAGER_SMTP_USER:-}
      ALERTMANAGER_SMTP_PASSWORD: ${ALERTMANAGER_SMTP_PASSWORD:-}
      ALERTMANAGER_EMAIL_TO_CRITICAL: ${ALERTMANAGER_EMAIL_TO_CRITICAL:-sre@govai-platform.com}
      ALERTMANAGER_EMAIL_TO_WARN: ${ALERTMANAGER_EMAIL_TO_WARN:-sre@govai-platform.com}
      ALERTMANAGER_SLACK_URL: ${ALERTMANAGER_SLACK_URL:-http://localhost/no-slack}
    ports:
      # AlertManager UI — bind ao loopback. Acesse via SSH tunnel.
      - "127.0.0.1:9093:9093"
    networks:
      - govai-prod-net
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  pgdata-prod:
    name: govai_pgdata_prod
  redisdata-prod:
    name: govai_redisdata_prod
  prometheusdata:
    name: govai_prometheusdata_prod
  prometheus_secrets:
    name: govai_prometheus_secrets_prod
  grafanadata:
    name: govai_grafanadata_prod
  alertmanagerdata:
    name: govai_alertmanagerdata_prod

networks:
  govai-prod-net:
    driver: bridge
    name: govai_prod_net
