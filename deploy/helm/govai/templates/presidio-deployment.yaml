{{- if .Values.presidio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "govai.fullname" . }}-presidio
  labels:
    {{- include "govai.labels" . | nindent 4 }}
    app.kubernetes.io/component: presidio
spec:
  replicas: {{ .Values.presidio.replicaCount }}
  selector:
    matchLabels:
      {{- include "govai.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: presidio
  template:
    metadata:
      labels:
        {{- include "govai.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: presidio
    spec:
      containers:
        - name: presidio
          image: "{{ .Values.image.presidio.repository }}:{{ .Values.image.presidio.tag }}"
          ports:
            - name: http
              containerPort: 5001
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources.presidio | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "govai.fullname" . }}-presidio
  labels:
    {{- include "govai.labels" . | nindent 4 }}
    app.kubernetes.io/component: presidio
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 5001
      targetPort: http
  selector:
    {{- include "govai.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: presidio
{{- end }}
