# =============================================================================
# GovAI Platform — Nginx Reverse Proxy (Production)
# =============================================================================
# Este arquivo é um template estático para uso direto no VPS sem envsubst.
# Substitua os domínios abaixo pelos seus antes de fazer deploy:
#   - api.yourdomain.com  → seu domínio da API
#   - admin.yourdomain.com → seu domínio do Admin UI
#
# Certificados SSL esperados em:
#   /etc/ssl/govai/cert.pem
#   /etc/ssl/govai/key.pem
#
# Para usar com docker-compose.prod.yml: mova para nginx/nginx.conf.template
# e use envsubst para substituir ${API_DOMAIN} e ${ADMIN_DOMAIN} no entrypoint.
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate limiting zones
    # API: 100 req/s por IP (burst de 200 — abaixo do rate limit do Fastify: 100/min para execute)
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    # Login: 2 req/min por IP (10 req/15min no Fastify — nginx filtra grosseiramente antes)
    limit_req_zone $binary_remote_addr zone=api_login:10m rate=2r/m;
    # Admin UI: sem rate limit agressivo (Next.js serve assets estáticos)
    limit_req_zone $binary_remote_addr zone=admin_ui:10m rate=50r/s;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffer sizes
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;

    # Headers de segurança compartilhados
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # -------------------------------------------------------------------------
    # Redirect HTTP → HTTPS (todos os vhosts)
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # API — https://api.yourdomain.com → :3000
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name api.yourdomain.com;

        # SSL
        ssl_certificate     /etc/ssl/govai/cert.pem;
        ssl_certificate_key /etc/ssl/govai/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS (6 meses, incluindo subdomínios)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # CSP para API (sem UI — permite apenas JSON responses)
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none';" always;

        # CORS — permitir apenas o Admin UI
        add_header Access-Control-Allow-Origin "https://admin.yourdomain.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID" always;
        add_header Access-Control-Max-Age 86400 always;

        # Preflight OPTIONS
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Endpoint de login com rate limit restrito
        location = /v1/admin/login {
            limit_req zone=api_login burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check sem rate limit (para load balancers)
        location = /health {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            access_log off;
        }

        # Métricas Prometheus — acesso restrito por IP (ajuste para seu IP de monitoramento)
        location = /metrics {
            # Descomentar e ajustar para restringir por IP:
            # allow 10.0.0.0/8;
            # deny all;

            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Todas as outras rotas da API
        location / {
            limit_req zone=api_general burst=100 nodelay;
            limit_req_status 429;

            # Rejeitar payloads > 10MB
            client_max_body_size 10m;

            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # SSE / streaming (execuções longas do LLM)
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # -------------------------------------------------------------------------
    # Admin UI — https://admin.yourdomain.com → :3001
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name admin.yourdomain.com;

        # SSL (mesmo certificado — use wildcard *.yourdomain.com ou cert separado)
        ssl_certificate     /etc/ssl/govai/cert.pem;
        ssl_certificate_key /etc/ssl/govai/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # HSTS
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;

        # CSP para Next.js
        add_header Content-Security-Policy "
            default-src 'self';
            script-src 'self' 'unsafe-inline' 'unsafe-eval';
            style-src 'self' 'unsafe-inline';
            img-src 'self' data: blob:;
            font-src 'self';
            connect-src 'self' https://api.yourdomain.com;
            frame-ancestors 'none';
            base-uri 'self';
            form-action 'self';
        " always;

        # Assets estáticos do Next.js com cache longo
        location /_next/static/ {
            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Todas as rotas do Next.js
        location / {
            limit_req zone=admin_ui burst=200 nodelay;

            proxy_pass http://127.0.0.1:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Next.js HMR (dev) — não relevante em prod, mas evita erros
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
