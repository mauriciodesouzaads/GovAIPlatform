name: GovAI Platform CI/CD

# ============================================================================
# Pipeline: 5 jobs encadeados
#
# lint-and-build ──────┬──► unit-tests ──────────┐
#                      ├──► integration-tests ────┼──► build-docker
#                      └──► security-scan ─────────┘
#
# Regras:
#   - Todos os jobs rodam em ubuntu-latest / Node 20
#   - unit-tests exclui os 3 arquivos de integração (requerem DB real)
#   - integration-tests sobe postgres:15 + redis:7 e aplica todas as migrations
#   - security-scan: npm audit (high) + Trivy no Dockerfile
#   - build-docker: valida --target production sem push
# ============================================================================

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# ── Secrets necessários (ver .github/SECRETS.md) ─────────────────────────────
# SIGNING_SECRET    — HMAC-SHA256 para audit logs
# JWT_SECRET        — assinatura de tokens JWT de sessão
# ORG_MASTER_KEY    — chave mestra BYOK para criptografia de DEKs
# Fallback: se o secret não estiver configurado, usa os valores de dev do .env.example

env:
  NODE_VERSION: '20'
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/govai_platform

jobs:

  # ── Job 1: Lint e Build TypeScript ──────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check (lint)
        run: npx tsc --noEmit

      - name: Build (tsc → dist/)
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ── Job 2: Testes unitários (sem DB) ────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build

    env:
      SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
      JWT_SECRET:     ${{ secrets.JWT_SECRET }}
      ORG_MASTER_KEY: ${{ secrets.ORG_MASTER_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        # Sem fallback: secrets ausentes devem causar falha explícita do job.
        # Um fallback com valor previsível permitiria a um atacante forjar JWTs
        # válidos durante execuções de pipeline em forks maliciosos.
        # Consulte .github/SECRETS.md para instruções de configuração.
        run: |
          missing=0
          if [ -z "$SIGNING_SECRET" ]; then
            echo "❌ SIGNING_SECRET não configurado. Ver .github/SECRETS.md"
            missing=$((missing + 1))
          fi
          if [ -z "$JWT_SECRET" ]; then
            echo "❌ JWT_SECRET não configurado. Ver .github/SECRETS.md"
            missing=$((missing + 1))
          fi
          if [ -z "$ORG_MASTER_KEY" ]; then
            echo "❌ ORG_MASTER_KEY não configurado. Ver .github/SECRETS.md"
            missing=$((missing + 1))
          fi
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "Configure em: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ Todos os secrets obrigatórios estão presentes."

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        # Exclui os 3 arquivos de integração que requerem DATABASE_URL e banco real:
        #   - governance.integration* → testes E2E com DB real
        #   - governance.flow*        → testes de fluxo com DB real
        #   - security.tenant-isolation* → testes RLS com DB real (job integration-tests)
        run: |
          npx vitest run \
            --exclude "**/governance.integration*" \
            --exclude "**/governance.flow*" \
            --exclude "**/security.tenant-isolation*"

  # ── Job 3: Testes de integração (com DB real) ────────────────────────────────
  integration-tests:
    name: Integration Tests (DB + Redis)
    runs-on: ubuntu-latest
    needs: lint-and-build

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       govai_platform
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/govai_platform
      SIGNING_SECRET: ${{ secrets.SIGNING_SECRET }}
      JWT_SECRET:     ${{ secrets.JWT_SECRET }}
      ORG_MASTER_KEY: ${{ secrets.ORG_MASTER_KEY }}
      PGPASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "$SIGNING_SECRET" ]; then
            echo "❌ SIGNING_SECRET não configurado. Ver .github/SECRETS.md"
            missing=$((missing + 1))
          fi
          if [ -z "$JWT_SECRET" ]; then
            echo "❌ JWT_SECRET não configurado. Ver .github/SECRETS.md"
            missing=$((missing + 1))
          fi
          if [ -z "$ORG_MASTER_KEY" ]; then
            echo "❌ ORG_MASTER_KEY não configurado. Ver .github/SECRETS.md"
            missing=$((missing + 1))
          fi
          if [ "$missing" -gt 0 ]; then
            echo ""
            echo "Configure em: Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "✅ Todos os secrets obrigatórios estão presentes."

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap DB — create govai_app role
        # govai_app é necessário para que a migration 019 passe o check de pré-requisito.
        # BYPASSRLS não é concedido aqui — a migration 024 faz o setup completo.
        run: |
          psql "$DATABASE_URL" -c \
            "DO \$\$ BEGIN
               IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'govai_app') THEN
                 CREATE ROLE govai_app WITH LOGIN PASSWORD 'govai_dev_app_password';
               END IF;
             END \$\$;"

      - name: Apply base schema (init.sql)
        run: psql "$DATABASE_URL" -f init.sql

      - name: Apply all numbered migrations in order
        # Aplica todos os arquivos [0-9]*.sql em ordem numérica (sort alfanumérica = numérica
        # para arquivos com prefixo de 3 dígitos: 011_, 012_, ..., 029_).
        # || true em cada migration garante que erros de idempotência (IF NOT EXISTS) não
        # interrompam o loop. Erros reais serão capturados pelo passo de smoke test abaixo.
        run: |
          for f in $(ls [0-9]*.sql 2>/dev/null | sort); do
            echo "→ Aplicando $f"
            psql "$DATABASE_URL" -f "$f" || echo "  ⚠ $f retornou erro (pode ser idempotente)"
          done

      - name: Smoke test — verify tables exist
        run: |
          psql "$DATABASE_URL" -c "\dt" | grep -E "users|assistants|audit_logs|pending_approvals"

      - name: Run tenant isolation tests
        run: npx vitest run src/__tests__/security.tenant-isolation.test.ts

  # ── Job 4: Security Scan ─────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (block on high/critical)
        # Falha se qualquer vulnerabilidade high ou critical for encontrada.
        # moderate/low são reportadas mas não bloqueiam o build.
        run: npm audit --audit-level=high

      - name: Run Trivy — Dockerfile config scan
        # Verifica má configuração no Dockerfile (usuário root, permissões inseguras, etc.)
        # exit-code 1 falha o job se CRITICAL/HIGH forem encontradas.
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          skip-dirs: 'node_modules,**/node_modules'
          # Ignora falsos positivos esperados no estágio de desenvolvimento
          trivyignores: '.trivyignore'

  # ── Job 5: Build Docker (sem push) ──────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests, security-scan ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Build production image (validate only — no push)
        # --target production: usa o stage final minimal (sem devDeps, sem source code).
        # Sem --push: apenas valida que a imagem compila com sucesso.
        # Se este job passar, a imagem está pronta para push em staging/prod
        # via um job separado com autenticação de registry.
        run: |
          docker build \
            -f Dockerfile \
            --target production \
            -t govai-platform:${{ github.sha }} \
            -t govai-platform:test \
            .

      - name: Verify image runs (smoke test)
        # Valida que o stage production contém um runtime Node funcional.
        # --entrypoint node -e "process.exit(0)" nunca carrega src/server.ts,
        # portanto nenhum secret é necessário aqui.
        run: |
          docker run --rm \
            --entrypoint node \
            govai-platform:test \
            -e "process.exit(0)"

      - name: Report image size
        run: |
          echo "### Docker Image Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          docker images govai-platform:test --format "| {{.Repository}} | {{.Tag}} | {{.Size}} |" >> $GITHUB_STEP_SUMMARY

  # ── Job 6: Deploy para VPS ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    needs: build-docker
    continue-on-error: true
    # Só roda em push para main E somente se DEPLOY_SSH_KEY estiver configurado.
    # Pull Requests nunca disparam o deploy.
    # Para desabilitar o deploy sem remover o job: basta não configurar o secret.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: ${{ vars.APP_BASE_URL }}

    # Secrets necessários para este job:
    #   DEPLOY_SSH_KEY  — chave SSH privada (Ed25519 recomendado) para o VPS
    #   DEPLOY_HOST     — hostname ou IP do VPS (ex: 203.0.113.10)
    #   DEPLOY_USER     — usuário SSH no VPS (ex: govai ou deploy)
    #   DEPLOY_PORT     — porta SSH (default: 22)
    # Vars (não secrets) necessárias:
    #   APP_BASE_URL    — URL pública da API (para exibir no environment URL acima)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || '22' }} \
            "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p "${{ secrets.DEPLOY_PORT || '22' }}" \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            bash -s << 'REMOTE_SCRIPT'
              set -euo pipefail
              cd /opt/govai-platform

              echo "=== Atualizando código ==="
              git fetch origin
              git checkout main
              git reset --hard origin/main
              echo "Commit: $(git rev-parse --short HEAD)"

              echo "=== Pull de imagens e build ==="
              docker compose -f docker-compose.prod.yml --env-file .env.prod \
                pull --ignore-pull-failures 2>/dev/null || true
              docker compose -f docker-compose.prod.yml --env-file .env.prod \
                build --no-cache

              echo "=== Aplicando migrations ==="
              docker compose -f docker-compose.prod.yml --env-file .env.prod \
                up -d database
              sleep 10
              docker run --rm \
                --network govai_prod_net \
                -v /opt/govai-platform/scripts:/scripts:ro \
                -e DATABASE_URL="postgresql://postgres:$(grep '^DB_PASSWORD=' .env.prod | cut -d= -f2- | tr -d '\"' | xargs)@database:5432/govai_platform" \
                postgres:15-alpine \
                bash /scripts/migrate.sh || echo "⚠ Migrations: verifique manualmente."

              echo "=== Subindo stack ==="
              docker compose -f docker-compose.prod.yml --env-file .env.prod \
                up -d --remove-orphans

              echo "=== Limpeza de imagens antigas ==="
              docker image prune -f

              echo "=== Deploy concluído: $(git rev-parse --short HEAD) ==="
          REMOTE_SCRIPT

      - name: Health check pós-deploy
        run: |
          echo "Aguardando API inicializar (30s)..."
          sleep 30
          APP_URL="${{ vars.APP_BASE_URL || 'http://localhost:3000' }}"
          status=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health" || echo "000")
          if [ "$status" = "200" ]; then
            echo "✅ Health check OK ($APP_URL/health → HTTP $status)"
          else
            echo "❌ Health check falhou: HTTP $status"
            exit 1
          fi

      - name: Notify deploy summary
        if: always()
        run: |
          echo "### Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
