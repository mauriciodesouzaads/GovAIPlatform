name: GovAI Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install Dependencies (API)
        run: npm ci
        
      - name: Lint API
        run: npm run lint
        
      - name: Run Unit Tests (API)
        run: npm test
        
      - name: Install Dependencies (Admin UI)
        run: cd admin-ui && npm install
        
      - name: Lint Admin UI
        run: cd admin-ui && npm run lint

  e2e-security:
    name: Security & E2E Validation
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Generate .env file
        run: |
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=admin" >> .env
          echo "DB_PASSWORD=admin" >> .env
          echo "DB_APP_PASSWORD=govai_ci_pass" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'fallback-secret-for-tests-32chars-min' }}" >> .env
          echo "SIGNING_SECRET=${{ secrets.SIGNING_SECRET || 'sign-secret-for-tests-32chars-min' }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "LITELLM_KEY=${{ secrets.LITELLM_KEY }}" >> .env
          echo "ORG_MASTER_KEY=${{ secrets.ORG_MASTER_KEY }}" >> .env
      - name: SRE Override
        run: |
          find . -name "*.sql" -type f -exec sed -i 's/GOVAI_APP_PASSWORD_PLACEHOLDER/govai_ci_pass/g' {} + || true

      - name: Start Services (Docker Compose)
        run: |
          docker compose --env-file .env up -d

      - name: Wait for Database and Seeding
        run: |
          echo "Aguardando Postgres ficar pronto..."
          until docker compose exec -T database pg_isready -U postgres; do
            echo "Postgres ainda não está pronto... aguardando 2s"
            sleep 2
          done
          
          echo "Aguardando 10s para processamento do init.sql..."
          sleep 10
          
          echo "Forçando alinhamento de senha diretamente no SGBD..."
          docker compose exec -T database psql -U postgres -c "ALTER USER govai_app WITH PASSWORD 'govai_ci_pass';" || true
          
          echo "Aguardando API /health ficar pronto..."
          for i in {1..20}; do
            if curl -s http://localhost:3000/health | grep -q '"status":"ok"'; then
              echo "✅ API configurada e saudável"
              break
            fi
            echo "Tentativa $i/20 — API não respondeu OK. Aguardando 5s..."
            sleep 5
            if [ $i -eq 20 ]; then
              echo "❌ API falhou no health check após 100s"
              docker compose logs api
              exit 1
            fi
          done
          
          echo "Iniciando seeding de dados..."
          bash scripts/demo-seed.sh
          
      - name: Run E2E Tests
        run: bash run_e2e_tests.sh
        
      - name: Stop Services
        if: always()
        run: docker compose down

  build-push:
    name: Build & Push Images
    needs: e2e-security
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build and Push Presidio Image
        uses: docker/build-push-action@v5
        with:
          context: ./presidio
          push: true
          tags: ghcr.io/${{ github.repository }}/govai-presidio:latest

      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/govai-api:latest
            ghcr.io/${{ github.repository }}/govai-api:${{ github.sha }}
          
      - name: Build and Push Admin UI Image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-ui
          file: ./admin-ui/Dockerfile.admin
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/govai-admin-ui:latest
            ghcr.io/${{ github.repository }}/govai-admin-ui:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.PROD_API_URL || 'https://api.govai-platform.com' }}
