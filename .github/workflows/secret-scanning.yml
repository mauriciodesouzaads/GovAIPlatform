name: Secret Scanning (Gitleaks)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gitleaks:
    name: Detect secrets in code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history — gitleaks scans all commits in the push/PR range
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # gitleaks-action reads .gitleaks.toml from the repo root if present.
        # It will fail the workflow (exit 1) on any detected secret.
        # The SARIF report is uploaded to GitHub Security → Code Scanning.

      - name: Upload SARIF report (if gitleaks found issues)
        if: failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        continue-on-error: true
